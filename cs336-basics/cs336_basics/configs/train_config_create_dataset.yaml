# config yaml for training

data:
  train_file: /Users/krangana/data/TinyStoriesV2-GPT4-train.txt    # pre-tokenized numpy array (run create_dataset.py)
  val_file: /Users/krangana/data/TinyStoriesV2-GPT4-valid.txt          # pre-tokenized numpy array
  context_length: 1024
  special_tokens: ["<|endoftext|>"]

model:
  backbone: null # eventually have this be like qwen, llama, etc. 
  vocab_size: 10000
  d_model: 512
  num_layers: 6
  num_heads: 8
  d_ff: 1344                      # typically ~2.7x d_model for SwiGLU
  rope_theta: 10000.0

training:
  batch_size: 32
  max_iters: 10000
  val_every: 500 
  val_iters: 50
  device: mps

optimizer:
  lr: 3e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  eps: 1e-8
  grad_clip: 1.0

lr_schedule:
  warmup_iters: 200
  min_lr: 3e-5                    # typically 10x smaller than lr

wandb:
  project: my_llm
  run_name: dummy

checkpoint:
  save_every: 1000
  out_dir: checkpoints/
  resume_from: null               # path to checkpoint to resume from, or null
